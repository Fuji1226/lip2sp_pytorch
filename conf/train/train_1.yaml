---

# デバッグ
debug : False
debug_data_len : 1000
debug_max_epoch : 100

# checkpointから再開する場合
check_point_start : False

# データを置いているディレクトリまでのパス
train_path : "/home/usr4/r70264c/dataset/lip/lip_cropped"
test_path : "/home/usr4/r70264c/dataset/lip"

# 学習したモデルのパラメータを保存するディレクトリまでのパス
train_save_path : "/home/usr4/r70264c/lip2sp_pytorch/result/default/train"

# check point path
ckpt_path : "/home/usr4/r70264c/lip2sp_pytorch/check_point/default"
ckpt_step : 10

# generate.pyを実行したときのデータを保存するディレクトリまでのパス
generate_save_path : "/home/usr4/r70264c/Projects/lip2sp_pytorch/result/default/generate"

# 平均、標準偏差を保存するディレクトリまでのパス
# mean_std_path : "/home/usr4/r70264c/dataset/lip/np_files/mean_std"
mean_std_path : "/Users/minami/Documents/python/lip2sp_pytorch/dataset/np_files/mean_std/train"

# 口唇動画、音響特徴量を保存するディレクトリまでのパス
# pre_loaded_path : "/home/usr4/r70264c/dataset/lip/np_files/train"
pre_loaded_path : "/Users/minami/Documents/python/lip2sp_pytorch/dataset/np_files/data/train/mspec"

# mlflowの保存先
experiment_name : "test"

# max_epoch
max_epoch : 200

# validation lossを計算する間隔
display_val_loss_step : 1

# dropout
dropout : 0.5

# global condition
use_gc : False

# dataloader
batch_size : 8
num_workers : 8

# optimizer
which_optim : "Adam"
lr : 0.001
beta_1 : 0.9
beta_2 : 0.999
weight_decay : 1.0e-6

# 学習率の減衰
lr_decay_rate : 0.5
lr_decay_step : 4   # max_epoch // lr_decay_stepでlr_decay_rate倍に学習率を変える

# gradient clipping
max_norm : 3.0

# 学習方法（"tf" or "ss"）
# tf : teacher forcing
# ss : scheduled sampling
training_method : "ss"
tm_change_step : 0    # training_methodを変更するタイミング(max_epoch * tm_change_stepで変わる)

# parameter for scheduled sampling
num_passes : 1     # 繰り返し回数(使ってません…)
mixing_prob : 0.5  # 混合率(低いほうがより学習が難しくなり，汎化を促進するはずです)
mp_change_step : 0.5    # mixing_probを変更するタイミング((max_epoch * tm_change_stepで変わる)

# 学習時の処理
auto_regressive : False

# 途中のメルスペクトログラムの可視化
train_visualize : False
visualize_step : 200    # iteration
inference_visualize : False

# delta loss
blur : True
batch_norm : True

# 動画に対して最初にbatch normalizationをするかどうか
apply_first_bn : False

# 最初のresnetに対してのdropoutを行うかどうか
input_layer_dropout : True