---

# デバッグ
debug : False
debug_data_len : 500
debug_max_epoch : 20

# データを置いているディレクトリまでのパス
train_path : "/home/usr4/r70264c/dataset/lip/lip_cropped"
test_path : "/home/usr4/r70264c/dataset/lip"

# 学習したモデルのパラメータを保存するディレクトリまでのパス
train_save_path : "/home/usr4/r70264c/lip2sp_pytorch/result/with_d/train"

# check point path
ckpt_path : "/home/usr4/r70264c/lip2sp_pytorch/check_point/with_d"
ckpt_step : 10

# generate.pyを実行したときのデータを保存するディレクトリまでのパス
generate_save_path : "/home/usr4/r70264c/Projects/lip2sp_pytorch/result/with_d/generate"

# 平均、標準偏差を保存するディレクトリまでのパス
mean_std_path : "/home/usr4/r70264c/dataset/lip/np_files/mean_std"
# test_mean_std_path : "/home/usr4/r70264c/dataset/lip/np_files/mean_std"

# 口唇動画、音響特徴量を保存するディレクトリまでのパス
pre_loaded_path : "/home/usr4/r70264c/dataset/lip/np_files/train"
# test_pre_loaded_path : "/home/usr4/r70264c/dataset/lip/np_files/test"

# mlflowの保存先
experiment_name : "test"

# training
max_iter : 5
max_epoch : 200

# validation lossを計算する間隔
display_val_loss_step : 5

# dropout
dropout : 0.1

# global condition
use_gc : False

# dataloader
batch_size : 8
num_workers : 8

# optimizer
lr : 0.001
beta_1 : 0.9
beta_2 : 0.999
weight_decay : 1.0e-6

# 学習率の減衰
lr_decay_rate : 0.5
lr_decay_step : 4   # max_epoch // lr_decay_stepでlr_decay_rate倍に学習率を変える

# gradient clipping
max_norm : 3.0

# 学習方法（"tf" or "ss"）
# tf : teacher forcing
# ss : scheduled sampling
training_method : "ss"

# parameter for scheduled sampling
num_passes : 1     # 繰り返し回数
mixing_prob : 0.5  # 混合率
